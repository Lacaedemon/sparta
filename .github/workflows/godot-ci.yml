# CI for the Godot game: imports the project (validating scripts/scenes in full
# context) and runs the GUT unit-test suite headlessly. No export presets exist
# yet, so this validates and tests rather than exporting a build.
name: Godot CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# GODOT_VERSION: keep in sync with config/features in project.godot (Standard /
# GDScript build — gl_compatibility, no C#/.NET).
# GUT_VERSION:   pinned GUT release matching the Godot version.
env:
  GODOT_VERSION: 4.7.0
  GUT_VERSION: v9.7.0

jobs:
  test:
    name: Validate & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Godot ${{ env.GODOT_VERSION }}
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false   # Standard build, not the .NET/C# build

      - name: Install GUT ${{ env.GUT_VERSION }}
        # Vendored at run time (pinned tag) so the framework isn't committed to
        # the repo. The project's test files extend GutTest, so GUT must be
        # present before the import step below or validation would fail to
        # resolve that class. Local dev installs it the same way (test/README.md).
        run: |
          git clone --depth 1 --branch "$GUT_VERSION" https://github.com/bitwes/Gut.git /tmp/gut
          mkdir -p addons
          rm -rf addons/gut
          cp -r /tmp/gut/addons/gut addons/gut

      - name: Import & validate project
        # `--import` loads the whole project (autoloads, class_name globals and
        # cross-script references all resolve) and reports compile/import errors.
        # Godot doesn't reliably exit non-zero on script errors, so we fail the
        # job if any error marker shows up in the import log.
        run: |
          set -o pipefail
          godot --headless --import --verbose 2>&1 | tee import.log
          if grep -E "SCRIPT ERROR|Failed to load script|Parse Error|Compile Error" import.log; then
            echo "::error::Godot reported script/resource errors during import"
            exit 1
          fi

      - name: Run unit tests (GUT)
        # gut_cmdln runs without enabling the editor plugin; -gexit sets a
        # non-zero exit code if any test fails or errors -- but NOT if a test
        # script fails to parse. GUT's loader reports that with a plain print(),
        # not through the counters -gexit's exit code is derived from, so a
        # script that fails to parse is silently dropped from the run while the
        # suite still reports success and exits 0. Godot does print the
        # underlying script/parse-error markers to the log, though -- the same
        # ones the import step above already greps for -- so fail the job on
        # those too. Mirrors tools/check.sh's check_test.
        run: |
          set -o pipefail
          godot --headless -s addons/gut/gut_cmdln.gd \
            -gdir=res://test -ginclude_subdirs -gexit \
            -gjunit_xml_file=res://test_results.xml 2>&1 | tee test.log
          if grep -E "SCRIPT ERROR|Failed to load script|Parse Error|Compile Error" test.log; then
            echo "::error::GUT reported script/parse errors -- a test script failed to load and its tests were silently skipped"
            exit 1
          fi
