# Measures GDScript line coverage for the GUT unit suite and uploads it to
# Codecov. Instrumentation (addons/coverage, jamie-pate/godot-code-coverage's
# godot4 branch) runs the tests through reloaded, counter-injected copies of the
# scripts, so this is a job separate from the fast validate-and-test gate, which
# lives in godot-ci.yml and stays uninstrumented. Coverage *numbers* never gate a
# PR (a dip won't fail it), but a broken upload does -- fail_ci_if_error is true,
# so a token/config failure surfaces as a red check instead of failing silently.
name: Test coverage

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # GODOT_VERSION/GUT_VERSION pins now live as the composite action's own
      # defaults (.github/actions/setup-godot-project/action.yml). The
      # coverage addon (addons/coverage) is committed, so only GUT is
      # fetched at run time; import resolves autoloads/class_name globals/
      # cross-script references before the coverage run instruments and
      # reloads them.
      - name: Set up Godot project
        uses: ./.github/actions/setup-godot-project

      - name: Run unit tests with coverage
        # The pre/post-run hooks instrument res://scripts and write lcov.info.
        # -gexit still fails the job on a test failure, so a broken suite is
        # caught here too, but coverage numbers themselves never gate the PR.
        env:
          COVERAGE_LCOV_FILE: res://coverage/lcov.info
        run: |
          godot --headless -s addons/gut/gut_cmdln.gd \
            -gdir=res://test -ginclude_subdirs -gexit \
            -gpre_run_script=res://test/pre_run_hook.gd \
            -gpost_run_script=res://test/post_run_hook.gd

      - name: Verify coverage report was written
        # The post-run hook reports a failed lcov write with push_error(), which
        # does not make Godot exit non-zero, so the step above can pass without
        # producing a report. Fail here if it is missing -- a missing report is a
        # real breakage (distinct from a coverage dip, which never gates).
        run: |
          if [ ! -s coverage/lcov.info ]; then
            echo "::error::coverage/lcov.info was not written by the coverage run"
            exit 1
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage/lcov.info
          disable_search: true          # upload only the file above
          fail_ci_if_error: true         # a failed upload fails the job (catches token/config breakage)
          token: ${{ secrets.CODECOV_TOKEN }}
