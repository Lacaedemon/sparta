# Builds distributable game binaries for Windows, Linux, and macOS and attaches
# them to a GitHub Release. Triggered by pushing a version tag (e.g. v0.1.0);
# a manual run (workflow_dispatch) builds the same artifacts and uploads them as
# workflow artifacts for testing, without touching a release.
#
# Godot cross-exports every platform from the Linux runner using the matching
# export templates (downloaded below). On macOS the app is a universal
# (x86_64 + arm64) .app; on Windows the .exe (and the NSIS installer built
# below) is a PE binary. Both are code-signed and, for macOS, notarized when
# the required secrets are configured (see the "Code-sign / notarize" steps
# below and tools/installer/README.md for the exact secret names and how to
# obtain them) — otherwise those steps no-op with a log notice and the build
# ships unsigned, same as before: on macOS first-launch needs a right-click →
# Open (or `xattr -dr com.apple.quarantine`) to get past Gatekeeper; on
# Windows SmartScreen may warn.
name: Release builds

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Needs write access to publish release assets.
permissions:
  contents: write

env:
  # Keep in sync with godot-ci.yml / config/features in project.godot. The export
  # templates downloaded below must match this exact version.
  GODOT_VERSION: 4.7.0
  # rcodesign (apple-codesign) release used to sign/notarize macOS builds from
  # the Linux runner. Bump this if a newer release is needed; check
  # https://github.com/indygreg/apple-platform-rs/releases for the current tag.
  RCODESIGN_VERSION: 0.29.0

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Godot ${{ env.GODOT_VERSION }}
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false   # Standard build, not the .NET/C# build

      - name: Install export templates
        # setup-godot installs the editor but not the export templates; fetch the
        # matching .tpz and drop the platform templates where Godot looks for them.
        # Derive the version from the editor itself rather than GODOT_VERSION: Godot's
        # first stable of a minor reports "4.7.stable" (no ".0") and is tagged
        # "4.7-stable", while a patch is "4.7.1.stable" / "4.7.1-stable". Parsing
        # `godot --version` keeps the template tag and install dir matched to whatever
        # setup-godot resolved, instead of a hard-coded (and 404-prone) "4.7.0-stable".
        run: |
          set -euo pipefail
          VER="$(godot --version | sed 's/\.official.*//')"   # e.g. 4.7.stable or 4.7.1.stable
          TAG="${VER%.stable}-stable"                          # e.g. 4.7-stable or 4.7.1-stable
          TPZ="Godot_v${TAG}_export_templates.tpz"
          echo "Installing export templates for $VER (tag $TAG)"
          curl -fsSL -o "$TPZ" \
            "https://github.com/godotengine/godot-builds/releases/download/${TAG}/${TPZ}"
          DEST="$HOME/.local/share/godot/export_templates/${VER}"
          mkdir -p "$DEST"
          unzip -q "$TPZ" -d tpl
          mv tpl/templates/* "$DEST/"
          rm -rf tpl "$TPZ"

      - name: Import project
        # Loads autoloads, class_name globals and resources so the export below
        # resolves everything. A script/resource error here would ship a broken
        # build, so fail loudly (same guard as godot-ci.yml).
        run: |
          set -o pipefail
          godot --headless --import --verbose 2>&1 | tee import.log
          if grep -E "SCRIPT ERROR|Failed to load script|Parse Error|Compile Error" import.log; then
            echo "::error::Godot reported script/resource errors during import"
            exit 1
          fi

      - name: Export per platform
        run: |
          set -euo pipefail
          mkdir -p build/windows build/linux build/macos
          godot --headless --export-release "Windows Desktop" build/windows/sparta.exe
          godot --headless --export-release "Linux"           build/linux/sparta.x86_64
          godot --headless --export-release "macOS"           build/macos/sparta.zip
          # Every export must have produced a non-empty binary.
          for f in build/windows/sparta.exe build/linux/sparta.x86_64 build/macos/sparta.zip; do
            [ -s "$f" ] || { echo "::error::export produced no output: $f"; exit 1; }
          done
          ls -la build/windows build/linux build/macos

      - name: Code-sign Windows executable
        # Signs build/windows/sparta.exe in place with an Authenticode
        # certificate via osslsigncode (a Linux-native Authenticode signer, so
        # no Windows runner is needed). No-ops (see the skip step below) until
        # both secrets are configured. See tools/installer/README.md for what
        # to add and how to generate them.
        if: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 != '' && secrets.WINDOWS_CODESIGN_PASSWORD != '' }}
        env:
          PFX_BASE64: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 }}
          PFX_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y osslsigncode
          echo "$PFX_BASE64" | base64 -d > /tmp/windows-codesign.pfx
          osslsigncode sign \
            -pkcs12 /tmp/windows-codesign.pfx -pass "$PFX_PASSWORD" \
            -n "Sparta" -i "https://github.com/${{ github.repository }}" \
            -t http://timestamp.digicert.com \
            -in build/windows/sparta.exe -out build/windows/sparta.signed.exe
          mv build/windows/sparta.signed.exe build/windows/sparta.exe
          rm -f /tmp/windows-codesign.pfx

      - name: Skip Windows code-signing (secrets not configured)
        if: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 == '' || secrets.WINDOWS_CODESIGN_PASSWORD == '' }}
        run: |
          echo "::notice::WINDOWS_CODESIGN_PFX_BASE64/WINDOWS_CODESIGN_PASSWORD not set — shipping an unsigned Windows build. See tools/installer/README.md."

      - name: Code-sign & notarize macOS app
        # Signs the exported .app with a Developer ID Application certificate
        # and submits it to Apple's notary service, using rcodesign
        # (apple-codesign) so this runs on the Linux runner without a Mac.
        # No-ops (see the skip step below) until all four secrets are
        # configured. See tools/installer/README.md for what to add and how
        # to generate them.
        #
        # Staple the .app bundle itself, not the distribution zip: Apple's
        # stapling mechanism attaches the notarization ticket to a bundle
        # (.app/.pkg/.dmg), and a plain .zip has no defined location for a
        # staple to attach to. So the order here is submit-as-zip (notarization
        # requires a zip/dmg/pkg upload format) → wait for approval → staple
        # the extracted .app directory → re-zip the now-stapled .app as the
        # actual release artifact, rather than stapling the zip in place.
        # Unverified against a real signing/notarization run, like the rest of
        # this scaffold (see tools/installer/README.md) — no signing certs
        # exist yet to exercise it end-to-end — but this ordering matches
        # Apple's and rcodesign's documented stapling requirement.
        if: ${{ secrets.MACOS_CODESIGN_P12_BASE64 != '' && secrets.MACOS_CODESIGN_P12_PASSWORD != '' && secrets.MACOS_TEAM_ID != '' && secrets.MACOS_NOTARY_API_KEY_JSON != '' }}
        env:
          P12_BASE64: ${{ secrets.MACOS_CODESIGN_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MACOS_CODESIGN_P12_PASSWORD }}
          TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
          NOTARY_API_KEY_JSON: ${{ secrets.MACOS_NOTARY_API_KEY_JSON }}
        run: |
          set -euo pipefail
          curl -fsSL -o rcodesign.tar.gz \
            "https://github.com/indygreg/apple-platform-rs/releases/download/apple-codesign%2F${RCODESIGN_VERSION}/apple-codesign-${RCODESIGN_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          tar xzf rcodesign.tar.gz
          RCODESIGN="$(pwd)/apple-codesign-${RCODESIGN_VERSION}-x86_64-unknown-linux-musl/rcodesign"
          chmod +x "$RCODESIGN"

          echo "$P12_BASE64" | base64 -d > /tmp/macos-codesign.p12
          echo "$NOTARY_API_KEY_JSON" > /tmp/notary-api-key.json

          cd build/macos
          rm -rf _signing
          unzip -q sparta.zip -d _signing
          APP_DIR="$(find _signing -maxdepth 1 -name '*.app')"

          "$RCODESIGN" sign \
            --p12-file /tmp/macos-codesign.p12 --p12-password "$P12_PASSWORD" \
            --team-name "$TEAM_ID" \
            "$APP_DIR"

          # Notarization only accepts a zip/dmg/pkg upload, so re-zip the signed
          # .app into a throwaway submission archive — this is NOT the final
          # distribution zip, just notary-submit's required upload format.
          rm -f notary-submission.zip
          (cd _signing && zip -qr ../notary-submission.zip "$(basename "$APP_DIR")")

          # Submit and wait for Apple's decision, but don't staple the zip
          # (--staple would try to staple this throwaway submission archive,
          # which isn't a bundle format stapling supports).
          "$RCODESIGN" notary-submit --api-key-path /tmp/notary-api-key.json \
            --wait notary-submission.zip

          # Staple the ticket to the .app bundle itself.
          "$RCODESIGN" staple "$APP_DIR"

          # Re-zip the now-stapled .app as the actual release artifact.
          rm -f sparta.zip notary-submission.zip
          (cd _signing && zip -qr ../sparta.zip "$(basename "$APP_DIR")")

          rm -rf _signing
          cd -
          rm -f /tmp/macos-codesign.p12 /tmp/notary-api-key.json

      - name: Skip macOS code-signing/notarization (secrets not configured)
        if: ${{ secrets.MACOS_CODESIGN_P12_BASE64 == '' || secrets.MACOS_CODESIGN_P12_PASSWORD == '' || secrets.MACOS_TEAM_ID == '' || secrets.MACOS_NOTARY_API_KEY_JSON == '' }}
        run: |
          echo "::notice::MACOS_CODESIGN_P12_BASE64/MACOS_CODESIGN_P12_PASSWORD/MACOS_TEAM_ID/MACOS_NOTARY_API_KEY_JSON not fully set — shipping an unsigned, un-notarized macOS build. See tools/installer/README.md."

      - name: Install NSIS
        # NSIS 3.x (currently 3.08 on ubuntu-latest). No exact pin needed — the
        # script uses only stable NSIS 3 features; a future 3.x bump is safe.
        run: sudo apt-get update && sudo apt-get install -y nsis

      - name: Build Windows installer
        run: |
          set -euo pipefail
          # Sanitise slashes so branch-name runs (workflow_dispatch from
          # feat/windows-installer) produce a valid filename, not a missing-parent
          # directory error. Version tags (v0.1.0) contain no slashes, so this
          # is a no-op for real releases.
          V="${GITHUB_REF_NAME//\//-}"
          # OUTFILE is absolute so makensis writes straight into build/. A relative
          # OutFile resolves against the .nsi's directory (tools/installer/), not
          # this working directory.
          makensis \
            -DVERSION="${V}" \
            -DOUTFILE="$(pwd)/build/sparta-${V}-windows-setup.exe" \
            -DEXE_PATH="$(pwd)/build/windows/sparta.exe" \
            tools/installer/sparta.nsi

      - name: Code-sign Windows installer
        # Signs the installer .exe itself (in addition to the app .exe it
        # contains) with the same Authenticode certificate as above.
        if: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 != '' && secrets.WINDOWS_CODESIGN_PASSWORD != '' }}
        env:
          PFX_BASE64: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 }}
          PFX_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
        run: |
          set -euo pipefail
          V="${GITHUB_REF_NAME//\//-}"
          IN="build/sparta-${V}-windows-setup.exe"
          echo "$PFX_BASE64" | base64 -d > /tmp/windows-codesign.pfx
          osslsigncode sign \
            -pkcs12 /tmp/windows-codesign.pfx -pass "$PFX_PASSWORD" \
            -n "Sparta Installer" -i "https://github.com/${{ github.repository }}" \
            -t http://timestamp.digicert.com \
            -in "$IN" -out "${IN}.signed"
          mv "${IN}.signed" "$IN"
          rm -f /tmp/windows-codesign.pfx

      - name: Package
        run: |
          set -euo pipefail
          V="${GITHUB_REF_NAME//\//-}"
          cd build
          chmod +x linux/sparta.x86_64
          zip -j "sparta-${V}-windows-x86_64.zip" windows/sparta.exe
          zip -j "sparta-${V}-linux-x86_64.zip"   linux/sparta.x86_64
          # macOS export is already a zipped .app bundle — just give it the release name.
          cp macos/sparta.zip "sparta-${V}-macos-universal.zip"
          ls -la sparta-*.zip sparta-*-windows-setup.exe

      - name: Upload workflow artifacts
        # Always available (incl. manual runs) so a build can be downloaded and
        # tested without cutting a release.
        uses: actions/upload-artifact@v4
        with:
          name: sparta-builds
          path: |
            build/sparta-*.zip
            build/sparta-*-windows-setup.exe

      - name: Publish to the GitHub Release
        # Only on a version tag: create the release (with auto-generated notes) and
        # attach the builds, or upload to an existing release of that tag.
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          V="${GITHUB_REF_NAME}"
          ASSETS=(build/sparta-*.zip build/sparta-*-windows-setup.exe)
          gh release create "$V" --title "Sparta $V" --generate-notes "${ASSETS[@]}" \
            || gh release upload "$V" "${ASSETS[@]}" --clobber
