# Flags issue/PR-number citations (#123) left in GDScript comments -- CLAUDE.md's
# "Comments: no issue-number references" rule under "Code conventions". These
# slip through reflexively (grounding a fix by citing the PR that reported it)
# and were previously caught only by a later @claude review round; this check
# fails fast instead, the same way tools/check.sh's `chars` check catches
# curly-quote/em-dash violations.
#
# No Godot setup needed -- this is a plain grep over *.gd files via
# tools/check.sh comments, so the job runs fast with just a checkout.
name: Check Comment Citations

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: Comment citations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # tools/check.sh's `comments` check diffs HEAD against origin/main (or
          # an explicit base) to find only the lines THIS change adds. A shallow
          # (default) checkout has no origin/main ref and no shared history to
          # compute a merge-base against, so fetch everything.
          fetch-depth: 0

      - name: Check for issue/PR-number citations in GDScript comments
        env:
          # Pass the per-event base explicitly rather than relying on the
          # checkout's local main/origin/main state: a PR's base SHA is the
          # actual target of the merge, and a push event's `before` is the
          # previous tip of the branch. Falls through to check.sh's own
          # origin/main/main fallback (see resolve_comments_base) when neither
          # applies (e.g. workflow_dispatch).
          SPARTA_CHECK_COMMENTS_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: tools/check.sh comments

      - name: Check units convention in GDScript changes
        # Same diff-scoped shape (and the same base override) as the comments
        # check above -- see docs/units-convention.md for the rules this
        # enforces. Kept as its own step so a failure names the right rule.
        env:
          SPARTA_CHECK_COMMENTS_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: tools/check.sh units
