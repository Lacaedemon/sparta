# Dumps a per-tick SIM STATE TRANSCRIPT for the FULL website demo-clip set
# (website/tools/demo-catalog.sh — every clip embedded on the docs site) on every PR that
# changes game-visible code, for both the PR head and its merge-base, and posts a PR
# comment naming exactly which clips' sim content changed. This is genuine snapshot
# testing: the sim is deterministic for these scripted clips, so a transcript diff flags
# only real behavioral changes — the clip either intentionally changed (worth describing
# in the PR) or unintentionally regressed.
#
# This replaced a byte-hash comparison of the RENDERED clips: the encode is not
# byte-deterministic (two same-commit recordings differ), so hash/size diffs flagged
# ~every clip on ~every PR and carried no reviewable signal (#905). Comparing transcripts
# against the PR's own merge-base (generated in-job) also removes the old baseline's
# artifact-expiry and staleness problems — the answer is now "did THIS PR change any
# clip's behavior", not "does this branch differ from whatever was last deployed".
# Render-layer-only regressions (chrome, LOD, draw order) are outside this net; a
# perceptual frame check could cover them as a follow-up.
#
# Distinct from demo-video.yml: that workflow records ONE PR-tailored clip (chosen by the
# author via demos/demo.<slug>.json) and inlines it into the PR DESCRIPTION as the primary
# "look at my change" artifact. This workflow instead sweeps the site's ENTIRE demo
# catalog and reports what changed as a PR COMMENT — a broad regression net over content
# the author didn't necessarily touch directly, not a per-PR showcase.
#
# Deliberately INFORMATIONAL, not a blocking gate: a content change can be the PR's whole
# point, so the verdict on each changed clip belongs to a human. The job is
# continue-on-error and posts a plain comment, never a check-run failure.

name: Website demo diff

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    # Mirrors demo-video.yml's path filter (game-visible code), plus the demo catalog and
    # dump tooling themselves — a change to which clips get dumped, or how, should also
    # re-run the diff.
    paths:
      - 'scenes/**'
      - 'scripts/**'
      - 'assets/**'
      - 'project.godot'
      - 'website/tools/demo-catalog.sh'
      - 'website/tools/dump-demo-states.sh'
      - 'tools/ci/website-demo-state-diff.sh'

# One diff run per PR; a newer push cancels an in-flight one rather than queuing behind it.
concurrency:
  group: website-demo-diff-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write # post/update the diff summary comment

env:
  # Keep in sync with publish-site.yml / demo-video.yml / godot-ci.yml.
  GODOT_VERSION: 4.7.0
  GUT_VERSION: v9.7.0

jobs:
  demo-diff:
    # Same-repo only: a fork PR's GITHUB_TOKEN can't post the summary comment (the same
    # constraint demo-video.yml documents for its media-branch push).
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    # Never blocks a merge — this check is informational only (see file header).
    continue-on-error: true
    # Two full headless catalog sweeps (PR + merge-base); --fixed-fps detaches the sim
    # from the wall clock, so each sweep is CPU-bound, not clip-duration-bound.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          # The PR's actual merge-base with the base branch is computed below; fetch
          # enough history for merge-base to resolve.
          fetch-depth: 0

      - name: Set up Godot ${{ env.GODOT_VERSION }}
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false

      - name: Check out the merge-base tree
        run: |
          set -euo pipefail
          BASE_SHA=$(git merge-base "origin/${{ github.event.pull_request.base.ref }}" HEAD)
          echo "Merge-base: $BASE_SHA"
          git worktree add /tmp/base-tree "$BASE_SHA"

      - name: Install GUT ${{ env.GUT_VERSION }} (both trees)
        # The project's test files extend GutTest, so GUT must be present or the import
        # step inside dump-demo-states.sh fails to resolve that class.
        run: |
          git clone --depth 1 --branch "$GUT_VERSION" https://github.com/bitwes/Gut.git /tmp/gut
          for tree in "$GITHUB_WORKSPACE" /tmp/base-tree; do
            mkdir -p "$tree/addons"
            rm -rf "$tree/addons/gut"
            cp -r /tmp/gut/addons/gut "$tree/addons/gut"
          done

      - name: Dump state transcripts (this PR)
        timeout-minutes: 18
        run: |
          GODOT_BIN=godot website/tools/dump-demo-states.sh /tmp/transcripts-pr "$GITHUB_WORKSPACE"

      - name: Dump state transcripts (merge-base)
        timeout-minutes: 18
        # The PR's own dumper script runs against the merge-base TREE, so the diff never
        # depends on the base revision already containing the script (or agreeing on the
        # tick cadence).
        run: |
          GODOT_BIN=godot website/tools/dump-demo-states.sh /tmp/transcripts-base /tmp/base-tree

      - name: Build diff summary
        run: |
          tools/ci/website-demo-state-diff.sh \
            /tmp/transcripts-base /tmp/transcripts-pr /tmp/website-demo-diff.md

      - name: Post PR comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PR=${{ github.event.pull_request.number }}
          MARKER="<!-- sparta-website-demo-diff -->"
          INTRO="Per-tick sim state transcripts for every website demo clip, this PR's head vs its merge-base. A listed clip's sim content genuinely changed — either this PR's intended effect (worth a line in the description) or an unintended regression. Rendering-only changes are outside this net."
          BODY=$(printf '%s\n\n### 🎞️ Website demo snapshot diff\n\n%s\n\n%s\n\n<sub>Informational only — not a blocking gate. Transcript diffs are deterministic sim content, unlike the old rendered-clip byte hashes. See [#905](https://github.com/Lacaedemon/sparta/issues/905).</sub>' \
            "$MARKER" "$INTRO" "$(cat /tmp/website-demo-diff.md)")
          tools/ci/upsert-pr-comment.sh "${{ github.repository }}" "$PR" "$MARKER" "$BODY" "website demo diff comment"
