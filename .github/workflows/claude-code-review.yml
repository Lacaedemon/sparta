# Copy to .github/workflows/claude-code-review.yml in your repo.
# NOTE: requires the CLAUDE_CODE_OAUTH_TOKEN repository secret. It is passed
# explicitly (not via `secrets: inherit`) because the reusable workflow lives
# in a different account's repo (d-morrison/gha) — `inherit` only forwards
# secrets to reusable workflows within the SAME owner/org, so across owners it
# silently passes an empty token and the action aborts.
#
# No `pull_request:` trigger — GitHub Copilot code review is already enabled
# repo-wide via the `main` branch ruleset (`copilot_code_review`,
# `review_on_push: true`), so an automatic Claude review on every PR push is
# redundant. This workflow now runs only on manual `workflow_dispatch` — used
# for an ad-hoc re-review, and by claude.yml's own re-dispatch-after-push
# mechanism. Keep the file named claude-code-review.yml (or set claude.yml's
# review-workflow-file to match).
name: Claude Code Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to review'
        required: true
        type: number

jobs:
  review:
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      # Lets the reviewer install its github_ci MCP server so it can read the
      # PR's CI/check-run status. Reusable-workflow permissions are capped by
      # the caller, so the grant has to be set here too — without it the action
      # logs "The github_ci MCP server requires 'actions: read' permission.
      # Skipping CI server installation." and the review runs blind to CI state.
      actions: read
    # Pinned to the @v2 moving major tag — the upstream-recommended consumer pin
    # (v2 includes the Claude caller workflows).
    uses: d-morrison/gha/.github/workflows/claude-code-review.yml@v2
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    with:
      # Wires the workflow_dispatch input through so claude.yml can re-dispatch
      # a review on Claude's commits, or so a manual dispatch can target a PR.
      pr-number: ${{ inputs.pr_number }}
      prompt-addendum: |
        **Post line-specific findings as inline review comments** anchored to the
        relevant line(s) — use the inline-comment tool, not a prose list in the
        summary. Reserve the top-level summary comment for a brief overall verdict
        plus any finding not tied to a specific line; don't restate each inline
        comment there.

        If this PR has a posted game-state transcript comment (its own PR comment,
        separate from the gameplay clip in the PR description) — a collapsible
        "🔬 Per-tick state transcript" block, with a
        "Full machine-readable state transcript (JSON)" link beneath it — read the
        per-tick unit state there and use it to verify the change behaves as described,
        rather than relying on the video clip. The block lists each unit's State,
        formation, order mode, morale, soldier count, and centroid at the dumped ticks;
        the linked JSON has the full detail.

        **This verification is mandatory, not a spot-check.** Read every dumped tick in
        the transcript (or every frame of the video clip, if no transcript is posted) —
        not just the first and last — and explicitly cross-check each specific claim the
        PR description makes (an exact position/speed/state value, "slides from X to Y",
        "coasts instead of snapping") against what the data actually shows at those ticks.
        A PR whose description states a specific before/after value pair or a described
        trajectory is asserting something falsifiable — falsify it if it's wrong. A demo
        that runs without erroring and superficially matches the PR's prose (right units,
        right general shape) is not the same as one that proves the specific behavioral
        claim; a quantity that's supposed to change smoothly but is actually frozen for
        part of the window is a real finding, not a nitpick, even if the overall clip
        "looks fine." State explicitly in the review which claims were checked against
        transcript/frame data and what they showed, not just whether a demo was present.
