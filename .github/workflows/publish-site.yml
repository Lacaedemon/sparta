# Builds the Sparta documentation site (Quarto, in website/) and deploys it to
# GitHub Pages. The site embeds gameplay demo clips, so a first job records a
# couple of deterministic replays headlessly (Godot Movie Maker -> ffmpeg ->
# mp4 + poster) and uploads them as an artifact; the publish job (the reusable
# d-morrison/gha quarto-publish workflow) pulls that artifact in before render.
# So no binaries live in git and the clips always reflect the current main build.
#
# One-time setup: in repo Settings -> Pages, set "Source" to "Deploy from a
# branch", branch "gh-pages" / "(root)". Until then the site won't be served
# (the build and gh-pages deploy still run).
name: Publish site

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/publish-site.yml'
      # Game-code/demo changes can alter what the recorded clips show, so refresh
      # the site (and its demos) when they move too.
      - 'scenes/**'
      - 'scripts/**'
      - 'assets/**'
      - 'project.godot'
      - 'demos/**'
      - 'tools/demo/**'
  workflow_dispatch:

# Read-only by default; the publish job grants its own Pages permissions below.
permissions:
  contents: read

# One in-flight deploy at a time; let a running deploy finish (don't cancel).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Best-effort: record the demo clips and hand them to the publish job as an
  # artifact. If Godot/Movie Maker flakes (headless GL can deadlock) this job
  # fails but never blocks the deploy (continue-on-error + publish's if: always);
  # the pages then render without fresh video and the <video> embeds fall back.
  demos:
    if: github.repository == 'Lacaedemon/sparta'
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      # GODOT_VERSION/GUT_VERSION pins now live as the composite action's own
      # defaults (.github/actions/setup-godot-project/action.yml). No
      # workflow-level import step here: record-demos.sh does its own
      # `godot --headless --import` before recording.
      - name: Set up Godot project
        uses: ./.github/actions/setup-godot-project
        with:
          run-import: false

      - name: Install Xvfb + ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg

      - name: Record demo clips
        # Matches website-demo-diff.yml's budget for the same full, unfiltered
        # record-demos.sh run -- the DEMOS array has grown to 40+ entries (each
        # feature PR appends its own clip), so the per-run wall time has grown
        # with it; a tighter guard here would just be a stale leftover from when
        # the array was much smaller.
        timeout-minutes: 45
        run: website/tools/record-demos.sh "$GITHUB_WORKSPACE/website/media"

      - name: Upload demo media
        # One artifact carrying both the clips and their posters; the publish job
        # extracts it into website/media before Quarto renders. Retained 14 days
        # (not the default/shorter window) so the website demo-diff workflow can
        # download this same artifact from the latest successful run here as its
        # PR-diff comparison baseline — a 1-day window would almost always have
        # already expired by the time a PR's diff check runs.
        uses: actions/upload-artifact@v4
        with:
          name: demo-media
          path: |
            website/media/*.mp4
            website/media/*.jpg
          if-no-files-found: warn
          retention-days: 14

  # Render + deploy via the shared reusable workflow (d-morrison/gha). It checks
  # out the repo, pulls the demo-media artifact into website/media, renders the
  # Quarto project, and deploys to the gh-pages branch. Runs even if the demos
  # job flaked. As of gha v2 the deploy pushes to gh-pages (not the Pages
  # artifact), so the job needs contents: write rather than pages/id-token.
  publish:
    needs: [demos]
    if: always() && github.repository == 'Lacaedemon/sparta'
    permissions:
      contents: write
    uses: d-morrison/gha/.github/workflows/quarto-publish.yml@v2
    with:
      path: website
      pre-render-artifact: demo-media
      pre-render-artifact-path: website/media
