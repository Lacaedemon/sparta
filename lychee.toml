# lychee config for the Check Links workflow (overrides d-morrison/gha's bundled
# default; passed via `lychee-config: lychee.toml`). Mirrors that default and
# adds repo-specific exclusions.

max_retries = 3
max_concurrency = 10
user_agent = "Mozilla/5.0 (compatible; Lychee/0.15; +https://github.com/lycheeverse/lychee)"
accept = [200, 201, 202, 203, 204, 206, 301, 302, 303, 307, 308, 429]
timeout = 20

exclude = [
  # Bundled-default placeholders / local-only URLs.
  "https://github.com/YOUR-USERNAME/.*",
  "https://YOUR-USERNAME.github.io/.*",
  "https://your-username.github.io/.*",
  "http://localhost.*",
  "https://localhost.*",
  "http://127.0.0.1.*",
  "https://127.0.0.1.*",
  # pixabay blocks automated requests with HTTP 403 (the page works in a
  # browser) — a false positive for the link checker, so skip it.
  "^https://pixabay\\.com",
  # divideetimperamod.com (linked from docs/related-games.md) is intermittently
  # very slow and times out, reddening the check on PRs that don't touch that file
  # (even after re-runs). The site is reachable in a browser, so skip it rather
  # than re-cost a CI re-run each time.
  "^https://divideetimperamod\\.com",
  # opengameart.org (linked from ASSETS.md, assets/sfx/CREDITS.md,
  # assets/sfx/README.md, docs/asset-sources.md, website/assets.qmd) rejects
  # lychee's automated requests with HTTP 502 Bad Gateway, even though the
  # site loads normally in a browser — the same false-positive pattern as
  # pixabay above. Skip it rather than reddening unrelated PRs on an
  # unavoidable CI flake.
  "^https://opengameart\\.org",
  # game-icons.net (linked from docs/asset-sources.md, website/assets.qmd) is
  # failing lychee with "SSL certificate expired" as of 2026-07-09 — an
  # upstream cert-management issue outside this repo's control, reddening
  # every open PR's link-checker regardless of what the PR touches. Skip it
  # until the site renews its certificate; re-check periodically and remove
  # this exclusion once https://game-icons.net/ loads cleanly again.
  "^https://game-icons\\.net",
  # spotterup.com rejects lychee's automated request with HTTP 415
  # (Unsupported Media Type) even though the page loads fine in a browser —
  # the same false-positive pattern as pixabay/opengameart above. Linked as a
  # citation from SPEED_VERIFICATION.md.
  "^https://spotterup\\.com",
  # bandaarcgeophysics.co.uk rejects lychee's automated request with HTTP 403
  # (bot-blocking), same false-positive pattern. Linked as a citation from
  # SPEED_VERIFICATION.md.
  "^https://www\\.bandaarcgeophysics\\.co\\.uk",
]
